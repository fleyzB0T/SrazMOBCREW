<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MegaSkuci Manhunt</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Hudba na pozadi -->
  <audio id="bg-music" loop preload="auto"></audio>
  <audio id="click-sfx" src="https://pub-c95c8129ce2748ec939a746808530b19.r2.dev/click.mp3" preload="auto"></audio>

  <div id="game">
    <!-- Hlavni menu -->
    <div id="menu-screen">
      <div class="menu-content">
        <div class="menu-logo">MEGASKUCI</div>
        <h1 class="menu-title">MANHUNT</h1>
        <p class="menu-subtitle">MOBCREW</p>
        <button id="menu-start-btn">Začít hru</button>
      </div>
    </div>

    <!-- Intro video + vyber planu -->
    <div id="intro-screen" class="hidden">
      <video id="intro-video" playsinline></video>
      <div id="plan-overlay" class="hidden">
        <div id="plan-overlay-title">Vyber si plán</div>
        <p id="plan-overlay-subtitle">Tvoje rozhodnutí určí výsledek</p>
        <div id="plan-grid"></div>
      </div>
    </div>

    <!-- Video prehravac + volby -->
    <div id="video-screen" class="hidden">
      <video id="video-player" playsinline></video>
      <div id="video-overlay" class="hidden">
        <div id="overlay-title"></div>
        <div id="overlay-choices"></div>
      </div>
      <button id="back-btn" class="back-btn">Zpět na výběr</button>
    </div>

    <!-- Koncova obrazovka -->
    <div id="end-screen" class="hidden">
      <div id="end-title"></div>
      <div id="end-text"></div>
      <div id="end-buttons"></div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
